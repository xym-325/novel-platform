<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读 - 银月之庭</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar">
  <a href="/" class="logo">📚 银月之庭</a>
  <div class="nav-actions">
    <span id="navTitle" style="font-size:14px;color:var(--text-secondary);"></span>
  </div>
</nav>

<!-- 阅读进度条 -->
<div class="progress-bar" id="progressBar" style="width:0%;"></div>

<!-- 阅读器布局 -->
<div class="reader-layout">
  <!-- 侧边栏：目录 -->
  <aside class="reader-sidebar" id="sidebar">
    <div id="novelInfo"></div>
    <ul class="chapter-list" id="chapterList"></ul>
  </aside>

  <!-- 主阅读区 -->
  <main class="reader-main" id="readerMain">
    <!-- 工具栏 -->
    <div class="reader-toolbar">
      <a href="/" class="btn btn-ghost btn-sm">← 返回</a>
      <span class="toolbar-spacer"></span>
      <button class="btn btn-ghost btn-icon" onclick="changeFontSize(-1)" title="缩小字号">A-</button>
      <span style="font-size:12px;color:var(--text-muted);" id="fontSizeLabel">18px</span>
      <button class="btn btn-ghost btn-icon" onclick="changeFontSize(1)" title="放大字号">A+</button>
      <button class="btn btn-ghost btn-sm" id="themeBtn" onclick="cycleTheme()" title="切换主题">
        🌙 夜间
      </button>
      <button class="btn btn-outline btn-sm" id="addChapterBtn" onclick="showAddChapter()">➕ 添加章节</button>
    </div>

    <!-- 阅读内容 -->
    <div class="reader-content" id="readerContent">
      <div class="chapter-body" id="chapterBody">
        <div style="text-align:center;padding:60px;color:var(--text-muted);">
          加载中...
        </div>
      </div>
    </div>

    <!-- 底部导航 -->
    <div class="reader-footer">
      <button class="btn btn-outline btn-sm" id="prevBtn" onclick="prevChapter()" disabled>
        ← 上一章
      </button>
      <span style="font-size:13px;color:var(--text-muted);" id="chapterIndicator"></span>
      <button class="btn btn-outline btn-sm" id="nextBtn" onclick="nextChapter()" disabled>
        下一章 →
      </button>
    </div>
  </main>
</div>

<!-- 移动端目录按钮 -->
<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="目录">☰</button>

<script>
// ---------- 全局状态 ----------
let novelData = null;
let currentChapterIndex = 0;
let fontSize = 18;
const FONT_SIZE_MIN = 14;
const FONT_SIZE_MAX = 28;
const FONT_SIZE_STEP = 2;
const THEMES = ['light', 'dark', 'eye'];
const THEME_LABELS = ['☀️ 日间', '🌙 夜间', '🌿 护眼'];
let currentThemeIdx = 0;

// ---------- 初始化 ----------
const urlParams = new URLSearchParams(window.location.search);
const novelId = urlParams.get('id');
const chParam = urlParams.get('ch');

if (!novelId) {
  document.getElementById('chapterBody').innerHTML =
    '<div style="text-align:center;padding:60px;color:var(--text-muted);">缺少小说 ID 参数</div>';
} else {
  initReader();
}

async function initReader() {
  try {
    // 加载小说信息
    const res = await fetch(`/api/novels/${novelId}`);
    if (!res.ok) throw new Error('小说不存在或已被删除');
    novelData = await res.json();

    // 渲染小说信息到头部的侧边栏
    renderNovelInfo();

    // 渲染目录
    renderChapterList();

    // 恢复阅读进度
    restoreProgress();

    // 恢复主题
    restoreTheme();

    // 加载章节
    const chIdx = chParam !== null ? parseInt(chParam) : currentChapterIndex;
    await loadChapter(chIdx);

  } catch (err) {
    document.getElementById('chapterBody').innerHTML =
      `<div style="text-align:center;padding:60px;color:var(--text-muted);">
        <p>${err.message}</p>
        <a href="/" class="btn btn-outline" style="margin-top:16px;">返回首页</a>
      </div>`;
  }
}

// ---------- 渲染小说信息 ----------
function renderNovelInfo() {
  document.getElementById('navTitle').textContent = novelData.title;
  document.title = `${novelData.title} - 银月之庭`;

  const info = document.getElementById('novelInfo');
  info.className = 'novel-detail-header';
  info.innerHTML = `
    <div class="novel-cover" style="background:${novelData.coverColor}">
      ${novelData.title.charAt(0)}
    </div>
    <div class="novel-title">${escapeHtml(novelData.title)}</div>
    <div class="novel-author">${escapeHtml(novelData.author)}</div>
    <div class="novel-stats">
      ${novelData.chapters.length} 章 · ${formatWordCount(novelData.totalWords)}
    </div>
  `;
}

// ---------- 渲染目录 ----------
function renderChapterList() {
  const list = document.getElementById('chapterList');
  list.innerHTML = novelData.chapters.map((ch, i) => `
    <li class="${i === currentChapterIndex ? 'active' : ''}" onclick="loadChapter(${i})">
      <span style="font-size:11px;color:var(--text-muted);min-width:20px;">${i + 1}.</span>
      ${escapeHtml(ch.title)}
    </li>
  `).join('');
}

// ---------- 加载章节 ----------
async function loadChapter(index) {
  if (!novelData) return;
  if (index < 0 || index >= novelData.chapters.length) return;

  currentChapterIndex = index;

  try {
    const res = await fetch(`/api/novels/${novelId}/chapters/${index}`);
    if (!res.ok) throw new Error('章节加载失败');
    const chapter = await res.json();

    // 渲染内容
    document.getElementById('chapterBody').innerHTML = `
      <div class="chapter-title">${escapeHtml(chapter.title)}</div>
      ${chapter.content}
    `;

    // 更新 URL
    const url = new URL(window.location);
    url.searchParams.set('ch', index);
    window.history.replaceState({}, '', url);

    // 更新目录高亮
    renderChapterList();

    // 更新导航按钮
    document.getElementById('prevBtn').disabled = index === 0;
    document.getElementById('nextBtn').disabled = index >= novelData.chapters.length - 1;
    document.getElementById('chapterIndicator').textContent =
      `${index + 1} / ${novelData.chapters.length}`;

    // 滚动到顶部
    document.getElementById('readerContent').scrollTop = 0;

    // 保存进度
    saveProgress();

    // 更新进度条
    updateProgressBar();

    // 移动端关闭侧边栏
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.remove('open');
    }

  } catch (err) {
    document.getElementById('chapterBody').innerHTML = `
      <div style="text-align:center;padding:60px;color:var(--text-muted);">
        ${err.message}
      </div>
    `;
  }
}

// ---------- 章节导航 ----------
function prevChapter() {
  if (currentChapterIndex > 0) loadChapter(currentChapterIndex - 1);
}
function nextChapter() {
  if (currentChapterIndex < novelData.chapters.length - 1) loadChapter(currentChapterIndex + 1);
}

// ---------- 键盘导航 ----------
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') prevChapter();
  if (e.key === 'ArrowRight') nextChapter();
});

// ---------- 字号调节 ----------
function changeFontSize(delta) {
  fontSize = Math.max(FONT_SIZE_MIN, Math.min(FONT_SIZE_MAX, fontSize + delta * FONT_SIZE_STEP));
  document.documentElement.style.setProperty('--reader-font-size', fontSize + 'px');
  document.getElementById('fontSizeLabel').textContent = fontSize + 'px';
  localStorage.setItem('reader-fontSize', fontSize);
}

// 恢复字号
const savedFontSize = localStorage.getItem('reader-fontSize');
if (savedFontSize) {
  fontSize = parseInt(savedFontSize);
  document.documentElement.style.setProperty('--reader-font-size', fontSize + 'px');
  // 延迟更新 label（等 DOM 加载）
  setTimeout(() => {
    const label = document.getElementById('fontSizeLabel');
    if (label) label.textContent = fontSize + 'px';
  }, 0);
}

// ---------- 主题切换 ----------
function cycleTheme() {
  currentThemeIdx = (currentThemeIdx + 1) % THEMES.length;
  applyTheme();
}

function applyTheme() {
  const theme = THEMES[currentThemeIdx];
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = THEME_LABELS[currentThemeIdx];
  localStorage.setItem('reader-theme', currentThemeIdx);
}

function restoreTheme() {
  const saved = localStorage.getItem('reader-theme');
  if (saved !== null) {
    currentThemeIdx = parseInt(saved);
    applyTheme();
  }
}

// ---------- 进度保存 ----------
function saveProgress() {
  const progress = {
    novelId: novelId,
    chapterIndex: currentChapterIndex,
    timestamp: Date.now()
  };
  // 按小说 ID 存储
  const all = JSON.parse(localStorage.getItem('reading-progress') || '{}');
  all[novelId] = progress;
  localStorage.setItem('reading-progress', JSON.stringify(all));
}

function restoreProgress() {
  const all = JSON.parse(localStorage.getItem('reading-progress') || '{}');
  const progress = all[novelId];
  if (progress && progress.chapterIndex !== undefined) {
    currentChapterIndex = progress.chapterIndex;
  }
}

// ---------- 滚动进度条 ----------
function updateProgressBar() {
  const content = document.getElementById('readerContent');
  const bar = document.getElementById('progressBar');
  if (!content || !bar) return;
  const pct = content.scrollTop / (content.scrollHeight - content.clientHeight) * 100;
  bar.style.width = Math.min(100, Math.max(0, pct)) + '%';
}

document.addEventListener('DOMContentLoaded', () => {
  const content = document.getElementById('readerContent');
  if (content) {
    content.addEventListener('scroll', updateProgressBar);
  }
});

// 用 MutationObserver 等待 readerContent 出现
const observer = new MutationObserver(() => {
  const content = document.getElementById('readerContent');
  if (content) {
    content.addEventListener('scroll', updateProgressBar);
    observer.disconnect();
  }
});
observer.observe(document.body, { childList: true, subtree: true });

// ---------- 侧边栏切换 (移动端) ----------
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ---------- 工具函数 ----------

// ---------- 添加章节 ----------
function showAddChapter() {
  const pw = sessionStorage.getItem('auth-password');
  if (!pw) {
    const input = prompt('请输入作者密码以添加章节：');
    if (!input) return;
    sessionStorage.setItem('auth-password', input);
  }
  document.getElementById('addChapNovelTitle').textContent = novelData.title;
  document.getElementById('newChapterText').value = '';
  document.getElementById('addChapPreview').innerHTML = '';
  document.getElementById('addChapError').style.display = 'none';
  document.getElementById('addChapterModal').style.display = 'flex';
  document.getElementById('addChapSubmitBtn').disabled = false;
}

function hideAddChapter() {
  document.getElementById('addChapterModal').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', () => {
  const textarea = document.getElementById('newChapterText');
  if (textarea) {
    textarea.addEventListener('input', function() {
      const text = this.value;
      if (!text.trim()) { document.getElementById('addChapPreview').innerHTML = ''; return; }
      const chapters = detectChaptersFrontend(text);
      const preview = document.getElementById('addChapPreview');
      if (chapters.length === 0) {
        preview.innerHTML = '<div class="chapter-preview"><p style="padding:12px;font-size:13px;color:var(--text-muted);">未检测到章节标记，将作为单章添加（共 ' + text.replace(/\s/g,'').length + ' 字）</p></div>';
      } else {
        preview.innerHTML = '<div class="chapter-preview"><h3>📑 识别到 ' + chapters.length + ' 个章节</h3><ul>' + chapters.map((ch, i) => '<li><span class="ch-num">' + (i+1) + '</span>' + escapeHtml(ch.title) + '</li>').join('') + '</ul></div>';
      }
    });
  }
});

async function submitNewChapter() {
  const text = document.getElementById('newChapterText').value;
  if (!text.trim()) { document.getElementById('addChapError').textContent = '请输入章节内容'; document.getElementById('addChapError').style.display = 'block'; return; }

  const btn = document.getElementById('addChapSubmitBtn');
  btn.disabled = true;
  btn.textContent = '正在添加...';
  const pw = sessionStorage.getItem('auth-password') || '';

  try {
    const res = await fetch('/api/novels/' + novelId + '/chapters', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, password: pw })
    });
    const data = await res.json();
    if (res.ok) {
      hideAddChapter();
      // 重新加载小说信息
      const infoRes = await fetch('/api/novels/' + novelId);
      novelData = await infoRes.json();
      renderNovelInfo();
      renderChapterList();
      // 跳到新添加的第一章
      loadChapter(novelData.chapters.length - data.addedCount);
      showToast('添加成功！新增 ' + data.addedCount + ' 个章节', 'success');
    } else {
      document.getElementById('addChapError').textContent = data.error || '添加失败';
      document.getElementById('addChapError').style.display = 'block';
      btn.disabled = false;
      btn.textContent = '确认添加';
    }
  } catch (err) {
    document.getElementById('addChapError').textContent = '网络错误: ' + err.message;
    document.getElementById('addChapError').style.display = 'block';
    btn.disabled = false;
    btn.textContent = '确认添加';
  }
}

// 前端章节检测（复用）
function detectChaptersFrontend(text) {
  const patterns = [
    /^第[零一二三四五六七八九十百千万\d]+[章节卷部回]/gm,
    /^Chapter\s+\d+/gim,
    /^Part\s+\d+/gim,
    /^[#]{1,3}\s+.+/gm,
    /^[序楔终尾][章言声]/gm,
  ];
  for (const pattern of patterns) {
    const matches = [...text.matchAll(pattern)];
    if (matches.length >= 1) return matches.map(m => ({ title: m[0].trim() }));
  }
  return [];
}

function showToast(msg, type) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + (type || 'info');
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatWordCount(n) {
  if (n >= 10000) return (n / 10000).toFixed(1) + '万字';
  if (n >= 1000) return (n / 1000).toFixed(1) + '千字';
  return n + '字';
}
</script>

<!-- 添加章节弹窗 -->
<div class="modal-overlay" id="addChapterModal" style="display:none;">
  <div class="modal" style="max-width:600px;">
    <h3>➕ 添加新章节</h3>
    <p style="font-size:13px;color:var(--text-secondary);">向《<span id="addChapNovelTitle"></span>》追加章节</p>
    <div class="form-group">
      <textarea id="newChapterText" placeholder="在此粘贴新章节内容...&#10;&#10;章节会自动识别，支持：&#10;  第X章 xxx&#10;  Chapter X xxx&#10;  尾声&#10;  序章" style="width:100%;min-height:300px;font-family:Consolas,monospace;font-size:13px;line-height:1.8;"></textarea>
    </div>
    <div id="addChapPreview" style="margin-bottom:12px;"></div>
    <p id="addChapError" style="color:#c62828;font-size:13px;display:none;"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="hideAddChapter()">取消</button>
      <button class="btn btn-primary" id="addChapSubmitBtn" onclick="submitNewChapter()">确认添加</button>
    </div>
  </div>
</div>
</body>
</html>
